<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>N - Way of the Ninja</title>
    <style>
        /* Pure, distraction-free layout */
        html, body {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            background-color: #000; 
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        #game-container {
            width: 800px;
            height: 600px;
            image-rendering: pixelated; /* Keeps it sharp on 4K */
            transform-origin: center center;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.1);
        }

        ruffle-player {
            width: 100%;
            height: 100%;
            display: block;
        }
    </style>
</head>
<body>

    <div id="game-container"></div>

    <script>
        window.RufflePlayer = window.RufflePlayer || {};
        window.RufflePlayer.config = {
            autoplay: "on",
            unmuteOverlay: "visible",
            quality: "low", 
            letterbox: "on",
            /* STABILITY FIX: Switching to 'opaque' helps prevent the ActionScript 
               engine from hanging during heavy menu transitions.
            */
            wmode: "opaque",
            powerContext: "high-performance",
            contextMenu: "on"
        };
    </script>

    <script src="ruffle.js"></script>

    <script>
        const baseWidth = 800;
        const baseHeight = 600;
        const container = document.getElementById("game-container");

        function applyIntegerScale() {
            const windowWidth = window.innerWidth;
            const windowHeight = window.innerHeight;
            
            // Standard integer scaling math
            const scaleX = Math.floor(windowWidth / baseWidth);
            const scaleY = Math.floor(windowHeight / baseHeight);
            let optimalScale = Math.min(scaleX, scaleY);
            if (optimalScale < 1) optimalScale = 1; 

            container.style.transform = `scale(${optimalScale})`;
        }

        window.addEventListener("resize", applyIntegerScale);
        applyIntegerScale();

        window.addEventListener("DOMContentLoaded", () => {
            const ruffle = window.RufflePlayer.newest();
            const player = ruffle.createPlayer();
            container.appendChild(player);

            player.load({
                url: "N.swf",
                /* Allowing Script Access can help with SharedObject (Save Data) 
                   stability, which is often what causes menu freezes.
                */
                allowScriptAccess: true 
            }).then(() => {
                console.info("N.swf loaded.");
            }).catch((e) => console.error(e));
        });
    </script>

</body>
</html>
