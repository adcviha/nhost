<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>N - Way of the Ninja</title>
    <style>
        /* Keep the outer area black to stay focused, but let the game be itself */
        body { 
            background-color: #000; 
            margin: 0; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            overflow: hidden; 
        }
        #game-container { 
            width: 800px; 
            height: 600px; 
        }
        ruffle-player { 
            width: 100%; 
            height: 100%; 
        }
    </style>
</head>
<body>

    <div id="game-container"></div>

    <script src="ruffle.js"></script>

    <script>
        window.RufflePlayer = window.RufflePlayer || {};
        window.RufflePlayer.config = {
            "autoplay": "on",
            "unmuteOverlay": "hidden",
            "letterbox": "on",
            
            /* MAX PERFORMANCE: Disables vector smoothing/anti-aliasing */
            "quality": "low", 
            
            /* STABILITY: Opaque is the standard for non-glitchy menuing */
            "wmode": "opaque", 
            
            "warnOnUnsupportedContent": false
        };

        window.addEventListener("DOMContentLoaded", () => {
            const ruffle = window.RufflePlayer.newest();
            const player = ruffle.createPlayer();
            document.getElementById("game-container").appendChild(player);
            
            player.load({
                url: "N.swf",
                allowScriptAccess: true
            });

            // Keep focus on the game so inputs don't drop
            player.addEventListener("mousedown", () => player.focus());
        });
    </script>
</body>
</html>
