<!DOCTYPE html>
<html>
<head>
    <title>N-Host Private</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; background: #000; overflow: hidden; }
        
        /* This creates a perfectly centered 800x600 window */
        iframe {
            border: none;
            width: 800px;
            height: 600px;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }
    </style>
</head>
<body>

    <iframe src="https://ruffle.rs/demo/?file=https://adcviha.github.io/nhost/N.swf"></iframe>

</body>
</html>
