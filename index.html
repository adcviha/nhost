<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>N - Way of the Ninja (Stable Build)</title>
    <style>
        /* Deep Black Background for focus */
        html, body {
            margin: 0; padding: 0;
            width: 100vw; height: 100vh;
            background-color: #000;
            display: flex; justify-content: center; align-items: center;
            overflow: hidden;
        }

        /* Strict 800x600 Container */
        #game-container {
            width: 800px;
            height: 600px;
            image-rendering: pixelated; 
            transform-origin: center center;
            will-change: transform;
            transform: translateZ(0); 
        }

        ruffle-player {
            width: 100%;
            height: 100%;
            display: block;
        }
    </style>
</head>
<body>

    <div id="game-container"></div>

    <script>
        // --- UPDATED STABILITY CONFIG ---
        window.RufflePlayer = window.RufflePlayer || {};
        window.RufflePlayer.config = {
            "autoplay": "on",
            "unmuteOverlay": "visible",
            
            // "low" disables anti-aliasing. If the game still freezes, 
            // try removing this line to see if native rendering handles it better.
            "quality": "low", 
            
            // FIX: Changed from transparent to opaque to fix colors and crashes.
            "wmode": "opaque",
            
            // FIX: Force Ruffle to render a black background behind the game
            "backgroundColor": "#000000",
            
            "powerContext": "high-performance",
            "forceScaleFactor": 1, 
            "letterbox": "on",
            "warnOnUnsupportedContent": false
        };
    </script>

    <script src="ruffle.js"></script>

    <script>
        // --- INTEGER SCALING (NO SEAMS) ---
        const baseWidth = 800;
        const baseHeight = 600;
        const container = document.getElementById("game-container");

        function applyIntegerScale() {
            const scaleX = Math.floor(window.innerWidth / baseWidth);
            const scaleY = Math.floor(window.innerHeight / baseHeight);
            let optimalScale = Math.min(scaleX, scaleY);
            if (optimalScale < 1) optimalScale = 1; 
            container.style.transform = `scale(${optimalScale}) translateZ(0)`;
        }

        window.addEventListener("resize", applyIntegerScale);
        applyIntegerScale();

        // --- LOAD GAME ---
        window.addEventListener("DOMContentLoaded", () => {
            const ruffle = window.RufflePlayer.newest();
            const player = ruffle.createPlayer();
            container.appendChild(player);
            
            player.load({
                url: "N.swf",
                allowScriptAccess: true
            });
        });
    </script>
</body>
</html>
