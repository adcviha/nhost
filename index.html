<!DOCTYPE html>
<html>
<head>
    <title>N-Host Native</title>
    <style>
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            display: flex; justify-content: center; align-items: center;
            background-color: #000; overflow: hidden;
        }

        /* We set the box to be slightly larger than 800x600 
           to ensure no scrollbars or "cutoff" edges ever appear. */
        #ruffle {
            width: 805px;
            height: 605px;
        }
    </style>
</head>
<body>

    <div id="ruffle"></div>

    <script src="ruffle.js"></script>

    <script>
        window.RufflePlayer = window.RufflePlayer || {};
        window.addEventListener("DOMContentLoaded", () => {
            const ruffle = window.RufflePlayer.newest();
            const player = ruffle.createPlayer();
            document.getElementById("ruffle").appendChild(player);
            
            player.load({
                url: "N.swf",
                // This is the magic fix for "Cutoff"
                scale: "noscale", 
                forceScale: false,
                letterbox: "off",
                // This centers the game inside the 800x600 box
                align: "center", 
                quality: "high"
            });
        });
    </script>

</body>
</html>
