<!DOCTYPE html>
<html>
<head>
    <title>N Native</title>
    <style>
        /* Black out the background and center the player */
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            display: flex; justify-content: center; align-items: center;
            background-color: #000; overflow: hidden;
        }

        /* 1. We set the player to your "Perfect" resolution */
        /* 2. We use 'transform' to make it bigger without breaking the pixels */
        ruffle-player {
            width: 798px !important;
            height: 623px !important;
            transform: scale(1.25); /* Makes the vectors 25% bigger/thicker */
            image-rendering: crisp-edges;
        }
    </style>
</head>
<body>

    <script src="ruffle.js"></script>

    <script>
        window.RufflePlayer = window.RufflePlayer || {};
        window.addEventListener("load", () => {
            const ruffle = window.RufflePlayer.newest();
            const player = ruffle.createPlayer();
            document.body.appendChild(player);
            
            player.load({
                url: "N.swf",
                scale: "noscale",      // This stops the "Inverse Scaling" fucky-ness
                quality: "best",       // Forces thick, smooth vector lines
                wmode: "opaque",       // Fixes transparency glitches
                backgroundColor: "#000000" // Masks any remaining "white lines"
            });
        });
    </script>
</body>
</html>
