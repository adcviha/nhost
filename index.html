<!DOCTYPE html>
<html>
<head>
    <title>N</title>
    <style>
        /* Black out the whole browser and center the game */
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            display: flex; justify-content: center; align-items: center;
            background-color: #000; overflow: hidden;
        }

        /* LOCKED RESOLUTION: This stops the white lines/scaling glitches */
        #ruffle {
            width: 1200px;
            height: 800px;
            background-color: #000;
        }
    </style>
</head>
<body>

    <div id="ruffle"></div>

    <script src="ruffle.js"></script>

    <script>
        window.RufflePlayer = window.RufflePlayer || {};
        window.addEventListener("load", () => {
            const ruffle = window.RufflePlayer.newest();
            const player = ruffle.createPlayer();
            document.getElementById("ruffle").appendChild(player);
            
            player.load({
                url: "N.swf",
                // SCALE: "EXACTFIT" forces it to stay 800x600 perfectly
                scale: "exactFit", 
                quality: "high",
                wmode: "opaque"
            });
        });
    </script>
</body>
</html>
