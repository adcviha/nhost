<!DOCTYPE html>
<html>
<head>
    <title>N-Native Vector</title>
    <style>
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            display: flex; justify-content: center; align-items: center;
            background-color: #0b0b0b; overflow: hidden;
        }

        #ruffle-container {
            /* We lock the "Logic" at 800x525 to prevent white lines */
            width: 800px;
            height: 525px;
            
            /* WE SCALE THE VISUALS HERE: 1.2 makes it 20% bigger 
               Change 1.2 to 1.5 if you want it even larger */
            transform: scale(1.2); 
            transform-origin: center;
            
            image-rendering: pixelated; /* Keeps lines sharp */
            box-shadow: 0 0 40px #000;
        }

        ruffle-player {
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>

    <div id="ruffle-container"></div>

    <script src="ruffle.js"></script>
    <script>
        window.RufflePlayer = window.RufflePlayer || {};
        window.addEventListener("load", () => {
            const ruffle = window.RufflePlayer.newest();
            const player = ruffle.createPlayer();
            document.getElementById("ruffle-container").appendChild(player);
            
            player.load({
                url: "N.swf",
                scale: "showAll",
                quality: "best", // Forces the highest vector smoothing
                wmode: "opaque",
                letterbox: "on",
                backgroundColor: "#000000" // Turns white seams into black seams
            });
        });
    </script>
</body>
</html>
