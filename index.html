<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>N - Way of the Ninja</title>
    <style>
        html, body {
            margin: 0; padding: 0;
            width: 100vw; height: 100vh;
            background-color: #000; /* Outer black */
            display: flex; justify-content: center; align-items: center;
            overflow: hidden;
        }

        #game-container {
            width: 800px;
            height: 600px;
            /* Force the container to be black to fix the "broken" background */
            background-color: #000 !important;
            image-rendering: pixelated; 
            transform-origin: center center;
        }

        ruffle-player {
            width: 100%;
            height: 100%;
            display: block;
        }
    </style>
</head>
<body>

    <div id="game-container"></div>

    <script src="ruffle.js"></script>

    <script>
        window.RufflePlayer = window.RufflePlayer || {};
        window.RufflePlayer.config = {
            "autoplay": "on",
            "unmuteOverlay": "hidden",
            "letterbox": "on",
            "quality": "high",
            // Use 'opaque' to force the player to ignore SWF transparency
            "wmode": "opaque",
            "base": "https://adcviha.github.io/nhost/",
            "warnOnUnsupportedContent": false
        };

        const container = document.getElementById("game-container");

        function applyIntegerScale() {
            const scaleX = Math.floor(window.innerWidth / 800);
            const scaleY = Math.floor(window.innerHeight / 600);
            let optimalScale = Math.min(scaleX, scaleY);
            if (optimalScale < 1) optimalScale = 1; 
            container.style.transform = `scale(${optimalScale})`;
        }

        window.addEventListener("resize", applyIntegerScale);
        applyIntegerScale();

        window.addEventListener("DOMContentLoaded", () => {
            const ruffle = window.RufflePlayer.newest();
            const player = ruffle.createPlayer();
            container.appendChild(player);

            player.load({
                url: "N.swf",
                // MANUALLY INJECTING THE MISSING METADATA
                backgroundColor: "#000000",
                forceAlign: true,
                forceScale: true,
                allowScriptAccess: true
            }).then(() => {
                // Focus hack to prevent menu input loss
                setInterval(() => {
                    if (document.activeElement !== player) player.focus();
                }, 1000);
            });
        });
    </script>
</body>
</html>
