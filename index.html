<!DOCTYPE html>
<html>
<head>
    <title>N-Host Native</title>
    <style>
        /* This makes the background a void so you don't see the "edges" */
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            display: flex; justify-content: center; align-items: center;
            background-color: #000; overflow: hidden;
        }

        /* We remove the fixed 800x600 here so it doesn't "crush" the canvas */
        #ruffle {
            width: 100vw;
            height: 100vh;
            max-width: 800px; /* Only limit the width */
            max-height: 525px; /* The real height of N v2.0 */
        }
    </style>
</head>
<body>

    <div id="ruffle"></div>

    <script src="ruffle.js"></script>

    <script>
        window.RufflePlayer = window.RufflePlayer || {};
        window.addEventListener("load", () => {
            const ruffle = window.RufflePlayer.newest();
            const player = ruffle.createPlayer();
            document.getElementById("ruffle").appendChild(player);
            
            player.load({
                url: "N.swf",
                // This forces Ruffle to stop trying to "fit" the game
                scale: "noscale", 
                padding: 0,
                allowScriptAccess: true,
                // These two lines prevent the "inverse scaling" glitch
                forceScale: false,
                forceLetterbox: false
            });
        });
    </script>
</body>
</html>
