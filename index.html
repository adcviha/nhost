<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>N - Way of the Ninja</title>
    <style>
        /* * 1. CSS Reset: Strip all default margins and padding.
         * 2. Layout: Use Flexbox to dead-center the game vertically and horizontally.
         * 3. Background: Deep black to mimic the standalone Flash projector feel.
         */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100vh;
            background-color: #000000;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden; /* Prevents scrollbars from appearing */
        }

        /* * Locking the exact dimensions here is the secret to fixing the "seam lines".
         * By not using percentages, we prevent the browser/Ruffle from micro-scaling
         * the vector tiles, keeping the edges crisp and seamless.
         */
        #game-container {
            width: 798px;
            height: 623px;
            /* Optional: Adds a subtle shadow to separate the game from the background */
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.05); 
        }

        /* Ensure the injected Ruffle player behaves inside our strict container */
        ruffle-player {
            width: 100%;
            height: 100%;
            display: block;
        }
    </style>
</head>
<body>

    <div id="game-container"></div>

    <script>
        window.RufflePlayer = window.RufflePlayer || {};
        window.RufflePlayer.config = {
            autoplay: "on",
            unmuteOverlay: "visible", // Browsers block auto-audio; this gives users a play button to allow sound
            quality: "high",          // Essential for N's smooth vector physics and text
            letterbox: "on",
            wmode: "direct",          // Bypasses browser compositing quirks for better performance
            contextMenu: "on"         // Allows right-click access to Ruffle's built-in settings
        };
    </script>

    <script src="ruffle.js"></script>

    <script>
        window.addEventListener("DOMContentLoaded", () => {
            const ruffle = window.RufflePlayer.newest();
            const player = ruffle.createPlayer();
            const container = document.getElementById("game-container");
            
            // Inject the player into our strictly sized container
            container.appendChild(player);

            // Load N.swf
            player.load({
                url: "N.swf",
                allowScriptAccess: false // Security best practice: N doesn't need to talk to the browser DOM
            }).then(() => {
                console.info("N.swf loaded successfully.");
            }).catch((error) => {
                console.error("Failed to load N.swf:", error);
            });
        });
    </script>

</body>
</html>
