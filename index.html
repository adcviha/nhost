<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>N - Way of the Ninja</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            background-color: #000; 
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        #game-container {
            /* True native resolution */
            width: 800px;
            height: 600px;
            
            /* No filters, just clean pixel scaling */
            image-rendering: -moz-crisp-edges;
            image-rendering: -webkit-optimize-contrast;
            image-rendering: crisp-edges;
            image-rendering: pixelated;
            
            transform-origin: center center;
        }

        ruffle-player {
            width: 100%;
            height: 100%;
            display: block;
        }
    </style>
</head>
<body>

    <div id="game-container"></div>

    <script>
        window.RufflePlayer = window.RufflePlayer || {};
        window.RufflePlayer.config = {
            autoplay: "on",
            unmuteOverlay: "visible",
            
            // THE COLOR & PERFORMANCE FIX:
            // 1. We go back to 'high' quality so the colors and lines are perfect.
            // 2. We use 'forceScaleFactor: 1' so Ruffle doesn't try to render at 4K.
            // 3. 'wmode: direct' restores the original Flash color space.
            quality: "high", 
            forceScaleFactor: 1, 
            wmode: "direct",
            
            letterbox: "on",
            contextMenu: "on"
        };
    </script>

    <script src="ruffle.js"></script>

    <script>
        const baseWidth = 800;
        const baseHeight = 600;
        const container = document.getElementById("game-container");

        function applyIntegerScale() {
            const windowWidth = window.innerWidth;
            const windowHeight = window.innerHeight;

            const scaleX = Math.floor(windowWidth / baseWidth);
            const scaleY = Math.floor(windowHeight / baseHeight);
            
            let optimalScale = Math.min(scaleX, scaleY);
            if (optimalScale < 1) optimalScale = 1; 

            container.style.transform = `scale(${optimalScale})`;
        }

        window.addEventListener("resize", applyIntegerScale);
        applyIntegerScale();

        window.addEventListener("DOMContentLoaded", () => {
            const ruffle = window.RufflePlayer.newest();
            const player = ruffle.createPlayer();
            container.appendChild(player);

            player.load({
                url: "N.swf",
                allowScriptAccess: true
            }).then(() => {
                console.info("N.swf loaded successfully with color fix.");
            }).catch((error) => {
                console.error("Load error:", error);
            });
        });
    </script>
</body>
</html>
