<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>N - Way of the Ninja (Pixel Perfect)</title>
    <style>
        html, body {
            margin: 0; padding: 0;
            width: 100vw; height: 100vh;
            background-color: #000;
            display: flex; justify-content: center; align-items: center;
            overflow: hidden;
        }

        #game-container {
            width: 800px;
            height: 600px;
            /* CRITICAL: Keep pixelated rendering to avoid smoothing the "bevel" */
            image-rendering: pixelated;
            transform-origin: center center;
        }

        ruffle-player {
            width: 100%;
            height: 100%;
            display: block;
        }
    </style>
</head>
<body>

    <div id="game-container"></div>

    <script>
        // Force 1:1 Pixel Ratio to stop the "Shadowing" leak
        Object.defineProperty(window, 'devicePixelRatio', {
            get: function() { return 1; }
        });

        window.RufflePlayer = window.RufflePlayer || {};
        window.RufflePlayer.config = {
            "autoplay": "on",
            "unmuteOverlay": "hidden",
            "quality": "low",
            "wmode": "direct",
            
            /* --- THE BEVEL FIX --- */
            "letterbox": "off",     // Prevents Ruffle from adding its own black bars
            "scale": "noScale",     // Stops the internal Flash engine from stretching
            "salign": "tl",         // Anchors coordinates to Top-Left (prevents sub-pixel drift)
            "forceScaleFactor": 1, 
            "forceAlign": true
        };
    </script>

    <script src="ruffle.js"></script>

    <script>
        const baseWidth = 800;
        const baseHeight = 600;
        const container = document.getElementById("game-container");

        function applyIntegerScale() {
            const scaleX = Math.floor(window.innerWidth / baseWidth);
            const scaleY = Math.floor(window.innerHeight / baseHeight);
            let optimalScale = Math.min(scaleX, scaleY);
            if (optimalScale < 1) optimalScale = 1; 

            // Using floor on the centering to ensure no sub-pixel placement
            container.style.transform = `scale(${optimalScale})`;
        }

        window.addEventListener("resize", applyIntegerScale);
        applyIntegerScale();

        window.addEventListener("DOMContentLoaded", () => {
            const ruffle = window.RufflePlayer.newest();
            const player = ruffle.createPlayer();
            container.appendChild(player);
            
            player.load({
                url: "N.swf",
                allowScriptAccess: true
            });
        });
    </script>
</body>
</html>
