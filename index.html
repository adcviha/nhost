<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>N - Way of the Ninja</title>
    <style>
        /* Keep everything centered and clean with a black background */
        html, body {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* Lock to the exact original resolution of N */
        #game-container {
            width: 800px;
            height: 600px;
        }

        /* Make the Ruffle player fill the fixed container */
        ruffle-player {
            width: 100%;
            height: 100%;
            /* Disable interpolation to speed up rendering */
            image-rendering: pixelated; 
        }
    </style>
</head>
<body>

    <div id="game-container"></div>

    <script>
        // Ruffle Configuration optimized for pure performance
        window.RufflePlayer = window.RufflePlayer || {};
        window.RufflePlayer.config = {
            "autoplay": "on",
            "unmuteOverlay": "hidden",   // Hides the "click to unmute" screen, auto-starts immediately
            "backgroundColor": "#DBDBDF",
            "letterbox": "on",           // Ensures aspect ratio is strictly maintained
            "quality": "low",            // CRITICAL FOR PERFORMANCE: Disables vector anti-aliasing for raw speed
            "warnOnUnsupportedContent": false,
            "showSwfDownload": false,
            "contextMenu": "off"         // Disables the right-click menu to save slight overhead
        };
    </script>

    <script src="ruffle.js"></script>

    <script>
        // Initialize Ruffle and load the SWF once the page is ready
        window.addEventListener("load", () => {
            const ruffle = window.RufflePlayer.newest();
            const player = ruffle.createPlayer();
            const container = document.getElementById("game-container");
            
            container.appendChild(player);
            
            // Load your specific game file
            player.load("N.swf");
        });
    </script>

</body>
</html>
