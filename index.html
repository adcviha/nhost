<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>N - Way of the Ninja</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            background-color: #111; /* Slightly softer black to reduce eye strain */
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        #game-container {
            /* We lock to the true native SWF resolution */
            width: 800px;
            height: 600px;
            
            /* * THE MAGIC SAUCE FOR 4K:
             * This tells the browser: "When you scale this up, do NOT blur it. 
             * Keep the pixels hard and sharp."
             */
            image-rendering: -moz-crisp-edges;
            image-rendering: -webkit-optimize-contrast;
            image-rendering: crisp-edges;
            image-rendering: pixelated;
            
            /* Prepare for JS scaling from the exact center */
            transform-origin: center center;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.8);
        }

        ruffle-player {
            width: 100%;
            height: 100%;
            display: block;
        }
    </style>
</head>
<body>

    <div id="game-container"></div>

    <script>
        window.RufflePlayer = window.RufflePlayer || {};
        window.RufflePlayer.config = {
            autoplay: "on",
            unmuteOverlay: "visible",
            quality: "high", 
            letterbox: "on",
            wmode: "direct",
            contextMenu: "on"
        };
    </script>

    <script src="ruffle.js"></script>

    <script>
        // --- INTEGER SCALING LOGIC ---
        // This ensures the game scales up to fit your 4K screen, but strictly
        // in whole numbers (1x, 2x, 3x, 4x) so the vector edges never land on a fraction.
        // This prevents the "seam lines" AND keeps the ninja incredibly sharp.

        const baseWidth = 800;
        const baseHeight = 600;
        const container = document.getElementById("game-container");

        function applyIntegerScale() {
            const windowWidth = window.innerWidth;
            const windowHeight = window.innerHeight;

            // Calculate the maximum whole number the game can be multiplied by to fit the screen
            const scaleX = Math.floor(windowWidth / baseWidth);
            const scaleY = Math.floor(windowHeight / baseHeight);
            
            // Pick the smaller scale so it doesn't clip off the screen. 
            // Default to 1 if the window is tiny.
            let optimalScale = Math.min(scaleX, scaleY);
            if (optimalScale < 1) optimalScale = 1; 

            // Apply the exact integer scale
            container.style.transform = `scale(${optimalScale})`;
            console.log(`Scaling game by ${optimalScale}x`);
        }

        // Run the math on load and whenever you resize the browser window
        window.addEventListener("resize", applyIntegerScale);
        applyIntegerScale();


        // --- RUFFLE INITIALIZATION ---
        window.addEventListener("DOMContentLoaded", () => {
            const ruffle = window.RufflePlayer.newest();
            const player = ruffle.createPlayer();
            
            container.appendChild(player);

            player.load({
                url: "N.swf",
                allowScriptAccess: false
            }).then(() => {
                console.info("N.swf loaded successfully.");
            }).catch((error) => {
                console.error("Failed to load N.swf:", error);
            });
        });
    </script>

</body>
</html>
