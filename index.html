<!DOCTYPE html>
<html>
<head>
    <title>N Native Vector</title>
    <style>
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background-color: #000; overflow: hidden;
            display: flex; justify-content: center; align-items: center;
        }

        /* Instead of a fixed box, we use a container that scales 
           BUT we force the internal player to stay 1:1 */
        #ruffle {
            width: 100%;
            height: 100%;
            max-width: 800px;
            max-height: 525px;
        }
    </style>
</head>
<body>

    <div id="ruffle"></div>

    <script src="ruffle.js"></script>

    <script>
        window.RufflePlayer = window.RufflePlayer || {};
        window.addEventListener("load", () => {
            const ruffle = window.RufflePlayer.newest();
            const player = ruffle.createPlayer();
            document.getElementById("ruffle").appendChild(player);
            
            player.load({
                url: "N.swf",
                // SCALE: "NOSCALE" is the key for vectors. 
                // It prevents Ruffle from trying to "fit" and failing.
                scale: "noscale", 
                align: "top", // N was often top-aligned in the browser
                quality: "high",
                wmode: "transparent", 
                letterbox: "off"
            });
        });
    </script>
</body>
</html>
