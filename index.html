<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>N - Way of the Ninja (Optimized)</title>
    <style>
        /* Deep black background and centered layout */
        html, body {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            font-family: sans-serif;
        }

        /* Fixed N-Game resolution */
        #game-container {
            width: 800px;
            height: 600px;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            background-color: #DBDBDF; /* N's classic grey */
        }

        /* Optimization: pixelated rendering prevents the GPU from 
           trying to "smooth" vectors, which saves CPU cycles */
        ruffle-player {
            width: 100%;
            height: 100%;
            image-rendering: pixelated; 
        }
    </style>
</head>
<body>

    <div id="game-container"></div>

    <script>
        // Ruffle Global Configuration
        window.RufflePlayer = window.RufflePlayer || {};
        window.RufflePlayer.config = {
            "autoplay": "on",
            "unmuteOverlay": "hidden",
            "backgroundColor": "#DBDBDF",
            "letterbox": "on",
            "quality": "low",            // Raw speed over smooth edges
            "preferredRenderer": "wgpu", // Attempt WebGPU for modern browser performance
            "warnOnUnsupportedContent": false,
            "showSwfDownload": false,
            "contextMenu": "off",
            "splashScreen": false,       // Skip the Ruffle logo
            "logLevel": "error"          // Silence console noise
        };
    </script>

    <script src="ruffle.js"></script>

    <script>
        window.addEventListener("load", () => {
            const ruffle = window.RufflePlayer.newest();
            const player = ruffle.createPlayer();
            const container = document.getElementById("game-container");
            
            container.appendChild(player);
            
            // Load the SWF
            player.load("N.swf").then(() => {
                console.log("N-Game Loaded Successfully");
                // Essential for menu responsiveness: 
                // Force focus so the browser captures clicks immediately
                player.focus();
            }).catch((e) => {
                console.error("Ruffle failed to load SWF:", e);
            });

            // Re-focus the player if the user clicks outside and comes back
            window.addEventListener("focus", () => {
                player.focus();
            });
        });
    </script>

</body>
</html>
