name: Update Ruffle Nightly

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    # This env block silences the Node.js 20 deprecation warning
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Fetch and Extract Latest Ruffle
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          LATEST_TAG=$(gh api repos/ruffle-rs/ruffle/releases | jq -r '[.[] | select(.prerelease==true)][0].tag_name')
          echo "Found latest Ruffle tag: $LATEST_TAG"
          
          gh release download $LATEST_TAG --repo ruffle-rs/ruffle --pattern "*web-selfhosted.zip" --dir .
          
          # Wipes all old Ruffle components
          rm -f ruffle.js ruffle.js.map *.wasm core.ruffle.*.js package.json LICENSE_* README.md
          
          unzip -o *web-selfhosted.zip -d .
          rm *web-selfhosted.zip

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          git add -A
          
          if ! git diff --staged --quiet; then
            git commit -m "Automated: Update Ruffle to $LATEST_TAG and clean old files"
            git push
          else
            echo "Ruffle is already up to date!"
          fi
